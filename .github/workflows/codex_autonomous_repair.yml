name: Codex Autonomous Repair

on:
  workflow_dispatch:
  schedule:
    - cron: "45 */6 * * *"

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  diagnose-repair-optimize:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
      ENTERPRISE_WECHAT_WEBHOOK_URL: ${{ secrets.ENTERPRISE_WECHAT_WEBHOOK_URL }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Codex / AI diagnose repair optimize
        run: python backend/workflows/autonomous_repair.py
      - name: Persist repair evidence
        if: always()
        env:
          STATE_COMMIT_MESSAGE: Persist Codex autonomous repair evidence
        run: python backend/workflows/persist_state.py
      - name: Upload repair report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-autonomous-repair-${{ github.run_id }}
          path: |
            backend/reports/autonomous_repair.json
            backend/reports/autonomous_repair.md
            backend/reports/system_integrity.json
            backend/reports/system_integrity.md
