name: 24h Codex Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: v11 system integrity
        run: python backend/workflows/system_integrity.py
      - name: Run watchdog
        run: python backend/workflows/watchdog.py
      - name: Publish watchdog summary
        run: |
          cat backend/reports/watchdog_status.md >> "$GITHUB_STEP_SUMMARY"
      - name: Persist watchdog state
        env:
          STATE_COMMIT_MESSAGE: Persist Codex watchdog state
        run: python backend/workflows/persist_state.py
      - name: Upload watchdog report
        uses: actions/upload-artifact@v4
        with:
          name: codex-watchdog-${{ github.run_id }}
          path: backend/reports/watchdog_status.md
