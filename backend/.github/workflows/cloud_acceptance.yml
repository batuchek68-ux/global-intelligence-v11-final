name: GitHub Cloud Acceptance

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  cloud-acceptance:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BING_SEARCH_KEY: ${{ secrets.BING_SEARCH_KEY }}
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: v11 system integrity
        run: python backend/workflows/system_integrity.py
      - name: Preflight check
        run: python backend/workflows/preflight_check.py
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Run daily operating cycle
        run: python backend/workflows/daily_job.py
      - name: Run watchdog
        run: python backend/workflows/watchdog.py
      - name: Run cloud acceptance
        run: python backend/workflows/cloud_acceptance.py
      - name: Persist acceptance evidence
        env:
          STATE_COMMIT_MESSAGE: Persist GitHub cloud acceptance evidence
        run: python backend/workflows/persist_state.py
      - name: Upload acceptance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: github-cloud-acceptance-${{ github.run_id }}
          path: |
            backend/reports/cloud_acceptance.md
            backend/reports/cloud_acceptance.json
            backend/reports/headquarters_status.md
            backend/reports/owner_inbox.md
            backend/reports/watchdog_status.md
            backend/reports/system_integrity.md
            backend/reports/system_integrity.json
            backend/memory/
