name: Global Intelligence Pipeline

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install feedparser PyGithub  # 确保安装了 PyGithub

      - name: Run pipeline
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }} # 注入你的令牌
        run: |
          python src/fetch_news.py
          python src/preprocess.py
          python src/analyze_trend.py
          python src/generate_report.py
          python main.py  # 这里添加了你的决策引擎入口

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "bot@users.noreply.github.com"

          git add data output || true
          git commit -m "auto update" || echo "no changes"
          git push || echo "push skipped"















